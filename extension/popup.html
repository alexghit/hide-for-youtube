<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hide for YouTube</title>
<style>
:root{
  --bg:#0c0c0e;
  --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.14);
  --ink:rgba(255,255,255,.94);--muted:rgba(255,255,255,.5);
  --faint:rgba(255,255,255,.3);--accent:rgba(255,255,255,.30);
  --sans:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Geist Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.22,1,.36,1);--t:200ms;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{min-height:100svh;display:flex;flex-direction:column;background:var(--bg);
  color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent}
::selection{background:var(--accent);color:var(--bg)}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

.topbar{display:flex;align-items:center;
  padding:32px 40px;font-family:var(--mono);font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted)}
.wordmark{color:var(--ink)}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:32px;padding:12px 24px 48px;text-align:center}




.segs{display:inline-flex;gap:4px;background:rgba(255,255,255,.05);
  border:1px solid var(--line);border-radius:999px;padding:4px}
.segs button{cursor:pointer;font-family:var(--mono);font-size:11px;
  letter-spacing:.04em;white-space:nowrap;border:none;border-radius:999px;
  padding:8px 14px;background:transparent;color:var(--muted);
  transition:background 220ms,color 220ms,transform 140ms var(--ease)}
.segs button:hover{color:rgba(255,255,255,.85)}
.segs button:active{transition:none;transform:scale(.94)}
.segs button[aria-pressed="true"]{background:rgba(255,255,255,.92);color:var(--bg)}


.footer{flex-shrink:0;display:flex;justify-content:center;
  align-items:center;gap:8px;padding:28px 24px 32px;font-family:var(--mono);
  font-size:11px;letter-spacing:.04em;color:var(--faint);text-align:center}
.footer a{color:var(--muted);text-decoration:none;
  border-bottom:1px solid var(--line-strong);
  transition:color var(--t),border-color var(--t)}
.footer a:hover{color:rgba(255,255,255,.85);border-bottom-color:rgba(255,255,255,.4)}
.footer .dot{opacity:.5}


@media (prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}

/* tool rules */
body{width:340px}
.topbar{padding:20px}
.stage{justify-content:flex-start;gap:20px;padding:0 20px 20px;text-align:left}
.footer{padding:16px 20px 20px}

.opts{width:100%;display:flex;flex-direction:column;gap:4px;
  transition:opacity var(--t)}
.opts[data-off]{opacity:.35;pointer-events:none}
.opt{display:flex;align-items:center;justify-content:space-between;gap:12px;
  width:100%;cursor:pointer;background:transparent;border:none;border-radius:10px;
  padding:8px 12px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;
  color:var(--muted);text-align:left;transition:background var(--t),color var(--t)}
.opt:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.85)}
.opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.opt[aria-pressed="true"]{color:var(--ink)}

.box{flex-shrink:0;width:14px;height:14px;border-radius:4px;
  border:1px solid var(--line-strong);position:relative;transition:background var(--t)}
.opt[aria-pressed="true"] .box{background:rgba(255,255,255,.92);border-color:transparent}
.opt[aria-pressed="true"] .box::after{content:"";position:absolute;inset:0;
  background:var(--bg);clip-path:polygon(18% 48%,40% 70%,84% 24%,84% 40%,40% 84%,18% 62%)}

.divider{height:1px;background:var(--line);width:100%}
</style>
</head>
<body>
<header class="topbar">
  <span class="wordmark">Hide for YouTube</span>
</header>

<main class="stage">
  <div class="segs" role="group" aria-label="Extension state" id="power">
    <button type="button" data-on="true" aria-pressed="true">On</button>
    <button type="button" data-on="false" aria-pressed="false">Off</button>
  </div>

  <div class="divider"></div>

  <div class="opts" id="opts">
    <button class="opt" type="button" data-k="feed" aria-pressed="true"><span>Hide homepage feed</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="shorts" aria-pressed="true"><span>Hide Shorts</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="suggestions" aria-pressed="true"><span>Hide suggestions</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="comments" aria-pressed="true"><span>Hide comments</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="endscreen" aria-pressed="true"><span>Hide videos at end</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="subsbar" aria-pressed="false"><span>Hide subscriptions bar</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="playlists" aria-pressed="false"><span>Hide playlists</span><span class="box"></span></button>
    <button class="opt" type="button" data-k="chat" aria-pressed="false"><span>Hide live chat</span><span class="box"></span></button>
  </div>

</main>

<footer class="footer">
  <span>Made with ♥ by Alex Ghit</span><span class="dot">·</span>
  <a href="https://hide.hey5.studio" target="_blank" rel="noopener">Privacy</a>
  <span class="dot">·</span><span>v1.0</span>
</footer>
<script src="popup.js"></script>
</body>
</html>
